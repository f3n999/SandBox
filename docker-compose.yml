name: mailguardianx

# ════════════════════════════════════════════════════════════
#  MailGuardianX — Stack complet
#  Réseaux séparés : "internal" pour les services backend
#                    "cape_isolated" sans Internet pour CAPE
#
#  Deux topologies de déploiement, au choix :
#
#  A) Un seul serveur — par défaut.
#     `docker compose --profile sandbox up -d`
#     CAPE, MongoDB et INetSim tournent comme conteneurs ici.
#     Demande un hôte qui supporte la virtualisation imbriquée
#     (CAPE détonne des VM Windows à l'intérieur du conteneur CAPE).
#
#  B) Deux machines — recommandé en production, c'est ce qui a
#     été démontré et validé pour ce projet.
#     `docker compose up -d` (sans --profile sandbox) sur la
#     machine orchestrateur ; cape/mongodb/inetsim ne démarrent
#     pas ici. CAPE tourne en installation native (pas Docker —
#     l'isolation KVM est plus fiable hors conteneur) sur une
#     deuxième machine dédiée. Pointer CAPE_API_URL vers son IP
#     dans `.env`. Voir GUIDE-DEPLOIEMENT.md, section
#     "Topologie B — deux machines".
#
#     Raison du choix B en pratique : héberger CAPE demande de la
#     virtualisation imbriquée (l'hôte doit exposer VT-x/AMD-V à
#     la VM ou au conteneur), ce que tous les environnements ne
#     supportent pas par défaut (notamment sur un hyperviseur de
#     type ESXi, où l'option doit être activée explicitement par
#     VM). Séparer la détonation sur sa propre machine évite aussi
#     que la sandbox — qui exécute volontairement du code
#     potentiellement malveillant — partage un réseau ou un compte
#     avec les services qui traitent les vraies données du pipeline.
# ════════════════════════════════════════════════════════════

services:

  # ════════════════════ ORCHESTRATOR API ════════════════════
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: mailguardianx/orchestrator:latest
    container_name: mgx-orchestrator
    restart: unless-stopped
    ports:
      - "${ORCHESTRATOR_PORT:-8000}:8000"
    environment:
      # URLs Redis lues depuis Docker Secrets à l'intérieur du container (config.py)
      # Ne pas mettre ${REDIS_PASSWORD} ici — le password n'est PAS une env var host
      # Topologie A (un serveur) : laisser la valeur par défaut, qui résout
      # vers le conteneur cape de cette même stack (profil "sandbox" actif).
      # Topologie B (deux machines) : surcharger CAPE_API_URL dans .env avec
      # l'IP de la machine sandbox, ex. CAPE_API_URL=http://192.0.2.10:8000
      CAPE_API_URL: ${CAPE_API_URL:-http://cape:8000}
      MISP_URL: http://misp:80
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      YARA_RULES_PATH: /app/yara-rules
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["https://dashboard.mailguardianx.local"]}
      SCHEDULE_ENABLED: ${SCHEDULE_ENABLED:-false}
      SCHEDULE_INTERVAL_MINUTES: ${SCHEDULE_INTERVAL_MINUTES:-15}
    secrets:
      - source: secret_key
        target: /run/secrets/secret_key
      - source: database_url
        target: /run/secrets/database_url
      - source: redis_url
        target: /run/secrets/redis_url
      - source: celery_broker_url
        target: /run/secrets/celery_broker_url
      - source: celery_result_backend
        target: /run/secrets/celery_result_backend
      - source: cape_api_token
        target: /run/secrets/cape_api_token
      - source: misp_api_key
        target: /run/secrets/misp_api_key
      - source: api_key_pepper
        target: /run/secrets/api_key_pepper
      - source: azure_tenant_id
        target: /run/secrets/azure_tenant_id
      - source: azure_client_id
        target: /run/secrets/azure_client_id
      - source: azure_client_secret
        target: /run/secrets/azure_client_secret
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ════════════════════ CELERY WORKER ════════════════════════
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: mailguardianx/orchestrator:latest
    container_name: mgx-celery-worker
    restart: unless-stopped
    environment:
      # Topologie A (un serveur) : laisser la valeur par défaut, qui résout
      # vers le conteneur cape de cette même stack (profil "sandbox" actif).
      # Topologie B (deux machines) : surcharger CAPE_API_URL dans .env avec
      # l'IP de la machine sandbox, ex. CAPE_API_URL=http://192.0.2.10:8000
      CAPE_API_URL: ${CAPE_API_URL:-http://cape:8000}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      YARA_RULES_PATH: /app/yara-rules
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    secrets:
      - source: database_url
        target: /run/secrets/database_url
      - source: redis_url
        target: /run/secrets/redis_url
      - source: celery_broker_url
        target: /run/secrets/celery_broker_url
      - source: celery_result_backend
        target: /run/secrets/celery_result_backend
      - source: cape_api_token
        target: /run/secrets/cape_api_token
      - source: misp_api_key
        target: /run/secrets/misp_api_key
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy

  # ════════════════════ CLAMAV ════════════════════════════════
  clamav:
    image: clamav/clamav:1.4
    container_name: mgx-clamav
    restart: unless-stopped
    environment:
      - CLAMAV_NO_FRESHCLAMD=false
      - CLAMD_STARTUP_TIMEOUT=120
    volumes:
      - clamav-data:/var/lib/clamav
    networks:
      - internal
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 30s
      start_period: 120s
      retries: 3

  # ════════════════════ CAPE SANDBOX ═════════════════════════
  # Profil "sandbox" : ne démarre que via `docker compose --profile
  # sandbox up -d` (topologie A, un seul serveur). En topologie B
  # (deux machines, recommandée), ce service reste éteint ici et
  # CAPE tourne en installation native sur la machine sandbox dédiée
  # — voir GUIDE-DEPLOIEMENT.md, "Topologie B".
  cape:
    profiles: ["sandbox"]
    image: kevoreilly/cape2:latest
    container_name: mgx-cape
    restart: unless-stopped
    privileged: true
    ports:
      - "8080:8000"   # CAPE Web UI / API
    volumes:
      - cape-storage:/opt/CAPEv2/storage
      - ./yara-rules:/opt/CAPEv2/data/yara/custom:ro
    environment:
      - CAPE_MONGO_HOST=mongodb
      - CAPE_MONGO_PORT=27017
    secrets:
      - source: cape_db_url
        target: /run/secrets/cape_db_url
    networks:
      - internal
      - cape_isolated     # VMs guest sortent par ce réseau (vers inetsim)
    depends_on:
      mongodb:
        condition: service_started
      inetsim:
        condition: service_started

  # ════════════════════ INETSIM (simu Internet pour CAPE) ════
  # Même profil "sandbox" que cape — voir le commentaire ci-dessus.
  inetsim:
    profiles: ["sandbox"]
    image: catatonicprime/inetsim:latest
    container_name: mgx-inetsim
    restart: unless-stopped
    networks:
      - cape_isolated
    volumes:
      - inetsim-data:/var/lib/inetsim
    # Pas de port exposé → reste sur le réseau isolé

  # ════════════════════ MISP ═════════════════════════════════
  misp:
    image: coolacid/misp-docker:latest
    container_name: mgx-misp
    restart: unless-stopped
    ports:
      - "8443:443"
      - "8081:80"
    volumes:
      - misp-data:/var/www/MISP
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: misp
      MYSQL_USER: misp
      MISP_BASEURL: ${MISP_BASEURL:-https://misp.mailguardianx.local}
    secrets:
      - source: mysql_misp_password
        target: /run/secrets/mysql_misp_password
      - source: misp_admin_email
        target: /run/secrets/misp_admin_email
      - source: misp_admin_passphrase
        target: /run/secrets/misp_admin_passphrase
    networks:
      - internal
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ════════════════════ POSTGRES ═════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: mgx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: orchestrator_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    secrets:
      - source: postgres_user
        target: /run/secrets/postgres_user
      - source: postgres_password
        target: /run/secrets/postgres_password
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/postgres_user)"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ════════════════════ MYSQL (pour MISP) ════════════════════
  mysql:
    image: mysql:8.0
    container_name: mgx-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: misp
      MYSQL_USER: misp
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_misp_password
    volumes:
      - mysql-data:/var/lib/mysql
    secrets:
      - source: mysql_root_password
        target: /run/secrets/mysql_root_password
      - source: mysql_misp_password
        target: /run/secrets/mysql_misp_password
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ════════════════════ MONGODB (pour CAPE) ══════════════════
  # Même profil "sandbox" que cape — voir le commentaire ci-dessus.
  mongodb:
    profiles: ["sandbox"]
    image: mongo:7
    container_name: mgx-mongodb
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    networks:
      - internal

  # ════════════════════ REDIS ════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: mgx-redis
    restart: unless-stopped
    command: >
      sh -c "redis-server
      --appendonly yes
      --requirepass $$(cat /run/secrets/redis_password)"
    volumes:
      - redis-data:/data
    secrets:
      - source: redis_password
        target: /run/secrets/redis_password
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$(cat /run/secrets/redis_password) ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ════════════════════ MONITORING ═══════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: mgx-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - internal

  grafana:
    image: grafana/grafana:latest
    container_name: mgx-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_password
      GF_USERS_ALLOW_SIGN_UP: "false"
    secrets:
      - source: grafana_password
        target: /run/secrets/grafana_password
      # Mot de passe Postgres — lu par la datasource Grafana via $__file{}
      - source: postgres_password
        target: /run/secrets/postgres_password
    networks:
      - internal
    depends_on:
      - prometheus
      - postgres


# ════════════════════════════════════════════════════════════
#  Réseaux
# ════════════════════════════════════════════════════════════
networks:
  internal:
    driver: bridge
  cape_isolated:
    driver: bridge
    internal: true       # ⚠️ CRITIQUE : pas d'accès Internet réel pour les VMs CAPE


# ════════════════════════════════════════════════════════════
#  Volumes nommés (gérés par Docker, persistants)
# ════════════════════════════════════════════════════════════
volumes:
  postgres-data:
  mysql-data:
  mongodb-data:
  redis-data:
  clamav-data:
  cape-storage:
  misp-data:
  inetsim-data:
  prometheus-data:
  grafana-data:


# ════════════════════════════════════════════════════════════
#  Secrets (Docker Swarm-compatible — fichiers locaux pour Compose)
#  Chaque secret = un fichier dans ./secrets/<nom>.txt (gitignored)
# ════════════════════════════════════════════════════════════
secrets:
  secret_key:
    file: ./secrets/secret_key.txt
  database_url:
    file: ./secrets/database_url.txt
  # Redis URLs (générées par setup-secrets.sh avec mot de passe inclus)
  redis_url:
    file: ./secrets/redis_url.txt
  celery_broker_url:
    file: ./secrets/celery_broker_url.txt
  celery_result_backend:
    file: ./secrets/celery_result_backend.txt
  cape_api_token:
    file: ./secrets/cape_api_token.txt
  cape_db_url:
    file: ./secrets/cape_db_url.txt
  misp_api_key:
    file: ./secrets/misp_api_key.txt
  misp_admin_email:
    file: ./secrets/misp_admin_email.txt
  misp_admin_passphrase:
    file: ./secrets/misp_admin_passphrase.txt
  api_key_pepper:
    file: ./secrets/api_key_pepper.txt
  azure_tenant_id:
    file: ./secrets/azure_tenant_id.txt
  azure_client_id:
    file: ./secrets/azure_client_id.txt
  azure_client_secret:
    file: ./secrets/azure_client_secret.txt
  postgres_user:
    file: ./secrets/postgres_user.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt
  mysql_misp_password:
    file: ./secrets/mysql_misp_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  grafana_password:
    file: ./secrets/grafana_password.txt
