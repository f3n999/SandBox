version: '3.8'

services:
  # ==================== MAIL INFRASTRUCTURE ====================

  mailcow:
    image: mailcow/mailcow-dockerized:latest
    container_name: mailcow
    hostname: mail.defense-ransomware.local
    restart: always
    ports:
      - "25:25"     # SMTP
      - "143:143"   # IMAP
      - "587:587"   # Submission
      - "993:993"   # IMAPS
      - "8443:443"  # HTTPS Admin
    volumes:
      - mailcow-data:/var/lib/mailcow
      - ./mail-infra/rspamd:/etc/rspamd/override.d
      - ./mail-infra/clamav:/var/lib/clamav
      - quarantine:/quarantine
    environment:
      - MAILCOW_HOSTNAME=mail.defense-ransomware.local
      - MAILCOW_TZ=Europe/Paris
    networks:
      - ransomware-net
    depends_on:
      - postgres
      - redis

  # ==================== ORCHESTRATOR ====================

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: orchestrator
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./orchestrator:/app
      - quarantine:/quarantine
      - analysis-results:/results
    environment:
      - DATABASE_URL=postgresql://ransomware_user:SecurePass123@postgres:5432/orchestrator_db
      - CAPE_API_URL=http://cape:8000
      - MISP_URL=http://misp:80
      - LOG_LEVEL=INFO
      - SECRET_KEY=${ORCHESTRATOR_SECRET_KEY}
    networks:
      - ransomware-net
    depends_on:
      - postgres
      - redis
      - cape
      - misp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== CAPE SANDBOX ====================

  cape:
    image: kevoreilly/cape2:latest
    container_name: cape-sandbox
    restart: always
    ports:
      - "8080:8000"
    volumes:
      - cape-storage:/opt/CAPEv2/storage
      - ./sandbox/yara-rules:/opt/CAPEv2/data/yara
      - ./sandbox/cape-config:/opt/CAPEv2/conf
    environment:
      - CAPE_DATABASE_CONNECTION=postgresql://cape_user:SecurePass123@postgres:5432/cape_db
      - CAPE_MONGO_HOST=mongodb
      - CAPE_MONGO_PORT=27017
    networks:
      - ransomware-net
    depends_on:
      - postgres
      - mongodb
    privileged: true  # Nécessaire pour VM Windows

  # ==================== MISP ====================

  misp:
    image: coolacid/misp-docker:latest
    container_name: misp
    restart: always
    ports:
      - "8443:443"
      - "8080:80"
    volumes:
      - misp-data:/var/www/MISP
      - ./threat-intel/misp-config:/etc/misp
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=SecurePass123
      - MISP_ADMIN_EMAIL=admin@defense-ransomware.local
      - MISP_ADMIN_PASSPHRASE=admin
      - MISP_BASEURL=https://misp.defense-ransomware.local
    networks:
      - ransomware-net
    depends_on:
      - mysql
      - redis

  # ==================== DATABASES ====================

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=SecurePostgresPass123
      - POSTGRES_MULTIPLE_DATABASES=orchestrator_db,cape_db
    networks:
      - ransomware-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=SecureMySQLPass123
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=SecurePass123
    networks:
      - ransomware-net
    command: --default-authentication-plugin=mysql_native_password

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    volumes:
      - mongodb-data:/data/db
    networks:
      - ransomware-net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - ransomware-net
    command: redis-server --appendonly yes

  # ==================== MONITORING (BONUS) ====================

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    networks:
      - ransomware-net
    depends_on:
      - postgres

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./monitoring/prometheus:/etc/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - ransomware-net

# ==================== NETWORKS ====================

networks:
  ransomware-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ==================== VOLUMES ====================

volumes:
  mailcow-data:
  quarantine:
  analysis-results:
  cape-storage:
  misp-data:
  postgres-data:
  mysql-data:
  mongodb-data:
  redis-data:
  grafana-data:
  prometheus-data:
